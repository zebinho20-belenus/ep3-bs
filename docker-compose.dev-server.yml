# DEV instance on server — runs alongside production
# Usage: docker compose -f docker-compose.dev-server.yml up -d
#
# Requires:
# - .env file (copy from .env.dev-server, adjust credentials)
# - External traefik_web network (shared with production Traefik)
# - Separate config files: local.php (DB: mariadb-dev), project.php (URLs: dev.*)

services:
  mailhog-dev:
    image: mailhog/mailhog:latest
    restart: always
    volumes:
      - ./tmp/mail:/maildir
    networks:
      - courtnet-dev

  mariadb-dev:
    image: mariadb:10.11
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./tmp/db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - courtnet-dev

  court-dev:
    image: court-dev
    build:
      dockerfile: Dockerfile
      args:
        INSTALL_XDEBUG: ${INSTALL_XDEBUG}
    restart: always
    volumes:
      - ./:/var/www/html
    depends_on:
      mailhog-dev:
        condition: service_started
      mariadb-dev:
        condition: service_healthy
    networks:
      - courtnet-dev
      - traefik_web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_web"

      # Secure Header Middleware + BasicAuth (dev-auth defined in tls.yaml on server)
      - "traefik.http.middlewares.secure-headers-dev.headers.customrequestheaders.X-Forwarded-Proto=https"
      - "traefik.http.routers.court-dev.middlewares=dev-auth-court@file,secure-headers-dev"

      # HTTP -> HTTPS Redirect
      - "traefik.http.routers.court-dev-redirect.entrypoints=web"
      - "traefik.http.routers.court-dev-redirect.rule=Host(`${APP_HOSTNAME}`)"
      - "traefik.http.routers.court-dev-redirect.middlewares=redirect-to-https-dev"
      - "traefik.http.middlewares.redirect-to-https-dev.redirectscheme.scheme=https"

      # HTTPS Router
      - "traefik.http.routers.court-dev.rule=Host(`${APP_HOSTNAME}`)"
      - "traefik.http.routers.court-dev.entrypoints=websecure"
      - "traefik.http.routers.court-dev.tls=true"
      - "traefik.http.routers.court-dev.tls.certresolver=myresolver"
      - "traefik.http.services.court-dev.loadbalancer.server.port=80"

networks:
  courtnet-dev:
    driver: bridge
  traefik_web:
    external: true
